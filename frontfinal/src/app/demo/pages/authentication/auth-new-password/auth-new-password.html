<div class="auth-wrapper">
  <div class="auth-content">
    <div class="auth-bg">
      <span class="r"></span>
      <span class="r s"></span>
      <span class="r s"></span>
      <span class="r"></span>
    </div>
    <div class="card">
      <div class="card-body text-center">

        @if (!success()) {
          <form (ngSubmit)="onSubmit()">
            <div class="mb-4">
              <i class="feather icon-key auth-icon"></i>
            </div>
            <h3 class="mb-2">New Password</h3>
            <p class="text-muted mb-4">Enter your new password below.</p>

            @if (error()) {
              <div class="alert alert-danger text-start">{{ error() }}</div>
            }

            <div class="input-group mb-3">
              <input
                [type]="showPassword() ? 'text' : 'password'"
                class="form-control"
                placeholder="New Password (min. 8 characters)"
                [(ngModel)]="password"
                name="password"
              />
              <i
                [ngClass]="showPassword() ? 'feather icon-eye' : 'feather icon-eye-off'"
                (click)="togglePassword()"
                style="cursor:pointer; position:absolute; right:10px; top:10px; z-index:10"
              ></i>
            </div>

            <div class="input-group mb-4">
              <input
                [type]="showConfirmPassword() ? 'text' : 'password'"
                class="form-control"
                placeholder="Confirm New Password"
                [(ngModel)]="confirmPassword"
                name="confirmPassword"
              />
              <i
                [ngClass]="showConfirmPassword() ? 'feather icon-eye' : 'feather icon-eye-off'"
                (click)="toggleConfirmPassword()"
                style="cursor:pointer; position:absolute; right:10px; top:10px; z-index:10"
              ></i>
            </div>

            <button type="submit" class="btn btn-primary mb-4 w-100">
              Reset Password
            </button>

            <p class="mb-0 text-muted">
              Remember your password?
              <a [routerLink]="['/login']">Back to Login</a>
            </p>
          </form>
        } @else {
          <div class="mb-4">
            <i class="feather icon-check-circle auth-icon text-success"></i>
          </div>
          <h3 class="mb-2">Password Reset!</h3>
          <p class="text-muted mb-4">
            Your password has been successfully reset. You can now login with your new password.
          </p>
          <a [routerLink]="['/login']" class="btn btn-primary">
            Back to Login
          </a>
        }

      </div>
    </div>
  </div>
</div>
