<div class="sidebar">
  <div class="sidebar-head">
    <div class="logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="white" width="20" height="20">
          <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
        </svg>
      </div>
      <div class="logo-text">
        Nexovera
        <div class="logo-sub">INVICTUS Platform</div>
      </div>
    </div>
  </div>
  <div style="overflow-y:auto;flex:1;padding:8px">
    <div class="sidebar-label">Navigation</div>
    <button 
      *ngFor="let page of currentRole.pages" 
      class="nav-item" 
      [class.active]="currentPage === page"
      (click)="navigateTo(page)"
    >
      <div class="ni-icon">{{ pageMeta[page]?.icon || '📄' }}</div>
      <div class="ni-text">{{ pageMeta[page]?.label || page }}</div>
    </button>
  </div>
  <div class="sidebar-user">
    <div class="user-row">
      <div class="avatar" [style.background]="currentRole.color">
        {{ currentRole.avatar }}
      </div>
      <div class="user-info">
        <div class="uname">{{ currentUser?.email?.split('@')[0] || 'User' }}</div>
        <div class="urole">{{ currentRole.name }}</div>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-title">{{ pageMeta.label }}</div>
      <span class="badge badge-green">Live</span>
    </div>
    <div class="topbar-right">
      <button class="tbr-btn" (click)="showReport()">📄 Generate Report</button>
      <button class="tbr-btn" (click)="toggleDecision()">✏️ Add Decision</button>
      <button class="tbr-btn primary" (click)="logout()">Logout</button>
    </div>
  </div>
  <div class="content">
    <router-outlet></router-outlet>
  </div>
</div>
