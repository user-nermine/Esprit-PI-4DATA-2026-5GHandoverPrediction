<div class="row">
  <div class="col-sm-12">
    <div style="background: linear-gradient(135deg, rgba(30, 64, 175, 0.05), rgba(29, 78, 216, 0.05)); border: 1px solid rgba(30, 64, 175, 0.2); border-radius: 20px; padding: 2rem; backdrop-filter: blur(10px); position: relative; overflow: hidden; box-shadow: 0 8px 32px rgba(30, 64, 175, 0.1);">
      <div style="position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #1e40af, #1d4ed8, #7C3AED, #FF4D9D);"></div>
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h5 style="color: #000000; font-size: 1.5rem; font-weight: 700; margin: 0;">{{ isEditMode ? 'Edit User' : 'Add New User' }}</h5>
        <span style="background: linear-gradient(135deg, #22c55e, #16a34a); color: black; padding: 0.5rem 1rem; border-radius: 15px; font-size: 0.8rem; font-weight: 600; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.2);">
          📝 {{ isEditMode ? 'Edit' : 'Create' }}
        </span>
      </div>

        @if (error()) {
          <div style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; color: #EF4444; font-weight: 500;">{{ error() }}</div>
        }

        @if (loading() && isEditMode) {
          <div style="text-align: center; padding: 2rem;">
            <div style="width: 40px; height: 40px; border: 4px solid rgba(30, 64, 175, 0.2); border-top: 4px solid #1e40af; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto;"></div>
          </div>
        } @else {
          <form (ngSubmit)="onSubmit()">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label style="color: #1e40af; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; display: block;">Full Name</label>
                <input type="text" style="background: rgba(30, 64, 175, 0.1); border: 1px solid rgba(30, 64, 175, 0.3); color: #1e40af; padding: 0.75rem; border-radius: 12px; font-weight: 500; backdrop-filter: blur(10px); transition: all 0.3s ease; width: 100%;" [(ngModel)]="user.fullName"
                  name="fullName" placeholder="Enter full name" required />
              </div>
              <div class="col-md-6 mb-3">
                <label style="color: #1e40af; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; display: block;">Email Address</label>
                <input type="email" style="background: rgba(30, 64, 175, 0.1); border: 1px solid rgba(30, 64, 175, 0.3); color: #1e40af; padding: 0.75rem; border-radius: 12px; font-weight: 500; backdrop-filter: blur(10px); transition: all 0.3s ease; width: 100%;" [(ngModel)]="user.email"
                  name="email" placeholder="Enter email" required />
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label style="color: #1e40af; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; display: block;">
                  Password
                  @if (isEditMode) {
                    <span style="color: #6c757d; font-size: 0.75rem; margin-left: 0.5rem;">(leave blank to keep current)</span>
                  }
                </label>
                <input type="password" style="background: rgba(30, 64, 175, 0.1); border: 1px solid rgba(30, 64, 175, 0.3); color: #1e40af; padding: 0.75rem; border-radius: 12px; font-weight: 500; backdrop-filter: blur(10px); transition: all 0.3s ease; width: 100%;" [(ngModel)]="user.password"
                  name="password" placeholder="{{ isEditMode ? 'Leave blank to keep current' : 'Enter password' }}" />
              </div>
              <div class="col-md-6 mb-3">
                <label style="color: #1e40af; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; display: block;">Role</label>
                <select style="background: rgba(30, 64, 175, 0.1); border: 1px solid rgba(30, 64, 175, 0.3); color: #1e40af; padding: 0.75rem; border-radius: 12px; font-weight: 500; backdrop-filter: blur(10px); transition: all 0.3s ease; width: 100%;" [(ngModel)]="user.role" name="role">
                  <option style="background: #1a1a1a; color: #1e40af;" value="SYSTEM_ADMIN">System Admin</option>
                  <option style="background: #1a1a1a; color: #1e40af;" value="DATA_SCIENTIST">Data Scientist</option>
                  <option style="background: #1a1a1a; color: #1e40af;" value="RAN_ENGINEER">RAN Engineer</option>
                  <option style="background: #1a1a1a; color: #1e40af;" value="NOC_ENGINEER">NOC Engineer</option>
                  <option style="background: #1a1a1a; color: #1e40af;" value="PERFORMANCE_ENGINEER">Core Engineer</option>
                </select>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label style="color: #1e40af; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; display: block;">Status</label>
                <select style="background: rgba(30, 64, 175, 0.1); border: 1px solid rgba(30, 64, 175, 0.3); color: #1e40af; padding: 0.75rem; border-radius: 12px; font-weight: 500; backdrop-filter: blur(10px); transition: all 0.3s ease; width: 100%;" [(ngModel)]="user.status" name="status">
                  <option style="background: #1a1a1a; color: #22c55e;" value="ACTIVE">Active</option>
                  <option style="background: #1a1a1a; color: #EF4444;" value="SUSPENDED">Suspended</option>
                </select>
              </div>
            </div>

            <div style="margin-top: 1.5rem; display: flex; gap: 1rem;">
              <button type="submit" style="background: linear-gradient(135deg, #1e40af, #1d4ed8); border: 1px solid #1e40af; color: white; padding: 0.75rem 1.5rem; border-radius: 12px; font-weight: 600; backdrop-filter: blur(10px); transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(30, 64, 175, 0.2); display: inline-flex; align-items: center; gap: 0.5rem;" [disabled]="loading()">
                @if (loading()) { <span style="width: 16px; height: 16px; border: 2px solid rgba(0, 0, 0, 0.3); border-top: 2px solid black; border-radius: 50%; animation: spin 1s linear infinite; display: inline-block;"></span> }
                <i class="feather icon-save" style="font-size: 16px;"></i>
                {{ isEditMode ? 'Update User' : 'Create User' }}
              </button>
              <button type="button" style="background: linear-gradient(135deg, #6c757d, #495057); border: 1px solid #6c757d; color: black; padding: 0.75rem 1.5rem; border-radius: 12px; font-weight: 600; backdrop-filter: blur(10px); transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(108, 117, 125, 0.2); display: inline-flex; align-items: center; gap: 0.5rem;" routerLink="/users">
                <i class="feather icon-x" style="font-size: 16px;"></i> Cancel
              </button>
            </div>
          </form>
        }

      </div>
    </div>
  </div>
