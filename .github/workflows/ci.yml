name: CI Pipeline

on:
  push:
    branches: [clean_notebooks]
  pull_request:
    branches: [clean_notebooks]

jobs:

  code-quality:
    name: "Lint (Ruff)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check src/

  tests:
    name: "Tests (pytest)"
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install pytest numpy xgboost lightgbm scikit-learn pandas pyarrow seaborn matplotlib
      - run: pytest tests/ -v

  train-dry-run:
    name: "Train dry-run (tree models only)"
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt huggingface_hub
      - name: Pull PT_output from Hugging Face
        run: |
          python -c "
from huggingface_hub import snapshot_download
snapshot_download(
    repo_id='user-nermine/5g-handover-dvc-storage',
    repo_type='dataset',
    local_dir='.',
)
print('PT_output downloaded successfully')
"
      - name: Run pipeline
        run: python src/train.py --skip-deep --start-from dso1