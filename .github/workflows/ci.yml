name: CI Pipeline

on:
  push:
    branches: [clean_notebooks]
  pull_request:
    branches: [clean_notebooks]

jobs:

  code-quality:
    name: "Lint (Ruff)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check src/

  security:
    name: "Security (Bandit)"
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install bandit
      - run: bandit -r src/ -ll

  tests:
    name: "Tests (pytest)"
    runs-on: ubuntu-latest
    needs: security
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install pytest numpy xgboost lightgbm scikit-learn pandas pyarrow seaborn matplotlib
      - run: pytest tests/ -v

  train-dry-run:
    name: "Train dry-run"
    runs-on: self-hosted
    needs: tests
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: py -m pip install pandas numpy scikit-learn xgboost lightgbm pyarrow fastparquet matplotlib seaborn huggingface_hub mlflow
      - name: Pull data from Hugging Face
        run: py scripts/download_data.py
      - name: Data quality validation
        run: py scripts/validate_data.py
      - name: Run pipeline
        env:
          MLFLOW_TRACKING_URI: http://localhost:5000
          PYTHONIOENCODING: utf-8
        run: py src/train.py --skip-deep --start-from dso1