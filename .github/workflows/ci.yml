name: CI Pipeline

on:
  push:
    branches: [clean_notebooks]
  pull_request:
    branches: [clean_notebooks]

jobs:

  code-quality:
    name: "Lint (Ruff)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check src/

  tests:
    name: "Tests (pytest)"
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install pytest numpy xgboost lightgbm scikit-learn pandas pyarrow seaborn matplotlib
      - run: pytest tests/ -v

  train-dry-run:
    name: "Train dry-run (tree models only)"
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push'
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.B2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt dvc dvc-s3
      - name: Configure DVC remote
        run: |
          dvc remote modify b2remote endpointurl https://s3.eu-central-003.backblazeb2.com
          dvc remote modify b2remote access_key_id $AWS_ACCESS_KEY_ID
          dvc remote modify b2remote secret_access_key $AWS_SECRET_ACCESS_KEY
      - name: Pull data
        run: dvc pull PT_output.dvc --force
      - name: Run pipeline
        run: python src/train.py --skip-deep --start-from dso1